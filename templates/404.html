{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
            min-height:60vh;text-align:center;padding:40px 20px;">
  <div style="font-size:5rem;font-weight:900;color:var(--accent);line-height:1;">404</div>
  <h1 style="font-size:1.6rem;font-weight:800;margin:16px 0 10px;">Page Not Found</h1>
  <p style="color:var(--muted);max-width:380px;line-height:1.6;">
    The page you're looking for doesn't exist or has been moved.
  </p>
  <div style="display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;justify-content:center;">
    <a href="{{ url_for('pages.home') }}" class="btn-primary">Go Home</a>
    <a href="{{ url_for('pages.app_page') }}" class="btn-primary"
       style="background:var(--surface);border:1px solid var(--glass-border);color:var(--text);">
      Open Engine
    </a>
  </div>
</div>
{% endblock %}
